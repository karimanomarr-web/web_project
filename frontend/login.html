<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In / Register — GarageBasics</title>
  <meta name="description" content="Sign in or create your GarageBasics account to shop, track orders, and manage your garage." />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/components.css" />
  <style>
    .auth-page {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--teal-dark) 0%, var(--grey-900) 60%);
      display: flex; align-items: center; justify-content: center; padding: 40px 24px;
    }
    .auth-card {
      background: var(--white); border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg); width: 100%; max-width: 480px; overflow: hidden;
    }
    .auth-header {
      background: linear-gradient(135deg, var(--orange) 0%, var(--orange-dark) 100%);
      padding: 32px; text-align: center; color: var(--white);
    }
    .auth-logo { font-family: var(--font-display); font-size: 2rem; font-weight: 900; }
    .auth-logo span { color: rgba(255,255,255,.75); }
    .auth-tagline { font-size: 0.875rem; color: rgba(255,255,255,.8); margin-top: 4px; }
    .auth-tabs { display: flex; border-bottom: 2px solid var(--grey-100); }
    .auth-tab {
      flex: 1; padding: 16px; text-align: center; font-weight: 700; font-size: 0.95rem;
      color: var(--grey-500); cursor: pointer; transition: all var(--transition);
      border-bottom: 3px solid transparent; margin-bottom: -2px;
    }
    .auth-tab.active { color: var(--orange); border-bottom-color: var(--orange); }
    .auth-body { padding: 32px; }
    .auth-form { display: none; }
    .auth-form.active { display: block; }
    .auth-footer { text-align: center; margin-top: 20px; font-size: 0.85rem; color: var(--grey-500); }
    .auth-footer a { color: var(--orange); font-weight: 600; }
    .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; color: var(--grey-400); font-size: 0.8rem; }
    .divider::before, .divider::after { content:''; flex:1; height:1px; background:var(--grey-200); }
    .back-home { position: fixed; top: 20px; left: 20px; }
  </style>
</head>
<body>

<a href="index.html" class="btn btn-ghost btn-sm back-home">← Home</a>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">Garage<span>Basics</span></div>
      <div class="auth-tagline">Premium Garage Organization</div>
    </div>

    <div class="auth-tabs">
      <div class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</div>
      <div class="auth-tab" id="tab-register" onclick="switchTab('register')">Create Account</div>
    </div>

    <div class="auth-body">
      <!-- Login Form -->
      <form class="auth-form active" id="login-form">
        <div id="login-alert"></div>
        <div class="form-group">
          <label class="form-label" for="login-email">Email Address</label>
          <input class="form-control" type="email" id="login-email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <input class="form-control" type="password" id="login-password" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn btn-primary btn-full btn-lg" id="login-btn">
          Sign In →
        </button>
        <div class="divider">or try demo accounts</div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
          <button type="button" class="btn btn-ghost btn-sm" onclick="fillDemo('admin')">
            ⚙️ Admin Demo
          </button>
          <button type="button" class="btn btn-ghost btn-sm" onclick="fillDemo('user')">
            👤 User Demo
          </button>
        </div>
        <div class="auth-footer">
          No account? <a href="#" onclick="switchTab('register')">Create one free</a>
        </div>
      </form>

      <!-- Register Form -->
      <form class="auth-form" id="register-form">
        <div id="register-alert"></div>
        <div class="form-group">
          <label class="form-label" for="reg-name">Full Name</label>
          <input class="form-control" type="text" id="reg-name" placeholder="John Doe" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-email">Email Address</label>
          <input class="form-control" type="email" id="reg-email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-password">Password</label>
          <input class="form-control" type="password" id="reg-password" placeholder="Min. 6 characters" required minlength="6" />
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-confirm">Confirm Password</label>
          <input class="form-control" type="password" id="reg-confirm" placeholder="Repeat password" required />
        </div>
        <button type="submit" class="btn btn-primary btn-full btn-lg" id="register-btn">
          Create Account →
        </button>
        <div class="auth-footer">
          Already have an account? <a href="#" onclick="switchTab('login')">Sign in</a>
        </div>
      </form>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="js/api.js"></script>
<script src="js/main.js"></script>
<script>
  // Redirect if already logged in
  if (Auth.isLoggedIn()) window.location.href = 'index.html';

  // Check URL param for tab
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('mode') === 'register') switchTab('register');

  function switchTab(tab) {
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
    document.getElementById(`tab-${tab}`).classList.add('active');
    document.getElementById(`${tab}-form`).classList.add('active');
  }

  function setAlert(id, msg, type = 'danger') {
    const el = document.getElementById(id);
    el.innerHTML = msg ? `<div class="alert alert-${type} mb-4">${msg}</div>` : '';
  }

  function setLoading(btnId, loading, text) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    btn.textContent = loading ? '⏳ Please wait…' : text;
  }

  function fillDemo(role) {
    if (role === 'admin') {
      document.getElementById('login-email').value = 'admin@garagebasics.com';
      document.getElementById('login-password').value = 'admin123';
    } else {
      document.getElementById('login-email').value = 'john@example.com';
      document.getElementById('login-password').value = 'user123';
    }
  }

  // ── Login ──
  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    setAlert('login-alert', '');
    setLoading('login-btn', true, 'Sign In →');
    try {
      const data = await api.auth.login({
        email: document.getElementById('login-email').value,
        password: document.getElementById('login-password').value,
      });
      Auth.save(data.token, data.user);
      Toast.show(`Welcome back, ${data.user.name}! 👋`, 'success');
      const redirect = urlParams.get('redirect') || 'index.html';
      setTimeout(() => { window.location.href = redirect; }, 900);
    } catch (err) {
      setAlert('login-alert', err.message);
      setLoading('login-btn', false, 'Sign In →');
    }
  });

  // ── Register ──
  document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    setAlert('register-alert', '');
    const password = document.getElementById('reg-password').value;
    const confirm  = document.getElementById('reg-confirm').value;
    if (password !== confirm) {
      setAlert('register-alert', 'Passwords do not match.');
      return;
    }
    setLoading('register-btn', true, 'Create Account →');
    try {
      const data = await api.auth.register({
        name:     document.getElementById('reg-name').value,
        email:    document.getElementById('reg-email').value,
        password,
      });
      Auth.save(data.token, data.user);
      Toast.show(`Account created! Welcome, ${data.user.name}! 🎉`, 'success');
      setTimeout(() => { window.location.href = 'index.html'; }, 900);
    } catch (err) {
      setAlert('register-alert', err.message);
      setLoading('register-btn', false, 'Create Account →');
    }
  });
</script>
</body>
</html>
