<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop All Products — GarageBasics</title>
  <meta name="description" content="Browse GarageBasics' full catalog of garage cabinets, flooring, workbenches, shelving, and accessories." />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/components.css" />
  <style>
    .shop-layout { display: grid; grid-template-columns: 280px 1fr; gap: 28px; padding: 32px 0 80px; align-items: start; }
    .shop-topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
    .results-count { color: var(--grey-600); font-size: 0.9rem; }
    .results-count strong { color: var(--grey-900); }
    .sort-select { padding: 9px 14px; border: 2px solid var(--grey-200); border-radius: var(--radius); font-size: 0.875rem; font-weight: 600; cursor: pointer; background: var(--white); }
    .sort-select:focus { outline: none; border-color: var(--orange); }
    .empty-state { text-align: center; padding: 80px 20px; grid-column: 1/-1; }
    .empty-state .empty-icon { font-size: 4rem; margin-bottom: 16px; }
    .filter-mobile-toggle { display: none; }
    @media (max-width: 1024px) {
      .shop-layout { grid-template-columns: 1fr; }
      .filter-sidebar { display: none; }
      .filter-sidebar.open { display: block; }
      .filter-mobile-toggle { display: flex; }
    }
  </style>
</head>
<body>

<!-- Promo Bar -->
<div class="promo-bar">🚚 Free shipping on orders over $500 · <a href="products.html">Shop All Products →</a></div>

<!-- Header -->
<header class="site-header">
  <div class="header-main">
    <div class="container">
      <div class="header-inner">
        <a href="index.html" class="site-logo">
          <div class="logo-icon">GB</div>
          <div>
            <div class="logo-text">Garage<span>Basics</span></div>
            <div class="logo-tagline">Premium Garage Solutions</div>
          </div>
        </a>
        <div class="header-search">
          <form id="search-form">
            <span class="search-icon">🔍</span>
            <input id="search-input" type="text" placeholder="Search products…" autocomplete="off" />
            <button type="submit" class="search-btn">Search</button>
          </form>
        </div>
        <div class="header-actions">
          <a href="login.html" class="header-btn" id="header-login-btn"><span class="icon">👤</span></a>
          <a href="#" class="header-btn hidden" id="header-user-btn"><span class="icon">👤</span><span id="header-user-name" class="user-name"></span></a>
          <a href="admin.html" class="header-btn hidden" id="header-admin-link" title="Admin"><span class="icon">⚙️</span></a>
          <a href="#" class="header-btn hidden" id="header-logout-btn" title="Logout"><span class="icon">🚪</span></a>
          <a href="cart.html" class="header-btn" style="position:relative;">
            <span class="icon">🛒</span><span class="cart-badge" style="display:none">0</span>
          </a>
        </div>
      </div>
    </div>
  </div>
  <nav class="category-nav"><div class="container"><div class="cat-nav-inner" id="cat-nav"></div></div></nav>
</header>

<!-- Page Header -->
<div style="background: var(--grey-900); padding: 32px 0 20px;">
  <div class="container">
    <div class="breadcrumb" style="color:var(--grey-500); margin-bottom:12px;">
      <a href="index.html" style="color:var(--grey-500)">Home</a>
      <span class="breadcrumb-sep">›</span>
      <span id="breadcrumb-cat" style="color:var(--grey-300)">All Products</span>
    </div>
    <h1 style="color:var(--white); font-size:1.8rem; font-weight:800;" id="page-title">All Products</h1>
  </div>
</div>

<div class="container">
  <div class="shop-layout">

    <!-- Sidebar Filters -->
    <aside>
      <div class="filter-sidebar" id="filter-sidebar">
        <div class="filter-title">
          Filters
          <button class="btn btn-ghost btn-sm" id="clear-filters-btn" onclick="clearFilters()">Clear All</button>
        </div>

        <!-- Category -->
        <div class="filter-group">
          <div class="filter-group-label">Category</div>
          <div id="filter-categories"></div>
        </div>

        <!-- Brand -->
        <div class="filter-group">
          <div class="filter-group-label">Brand</div>
          <div id="filter-brands"></div>
        </div>

        <!-- Price Range -->
        <div class="filter-group">
          <div class="filter-group-label">Price Range</div>
          <div class="price-range-wrap">
            <input type="number" id="filter-min-price" placeholder="Min $" min="0" />
            <span style="color:var(--grey-400)">–</span>
            <input type="number" id="filter-max-price" placeholder="Max $" min="0" />
          </div>
          <button class="btn btn-outline btn-sm mt-3 w-full" onclick="applyPriceFilter()">Apply Price</button>
        </div>

        <!-- In Stock -->
        <div class="filter-group">
          <div class="filter-option">
            <input type="checkbox" id="filter-instock" />
            <label for="filter-instock">In Stock Only</label>
          </div>
          <div class="filter-option">
            <input type="checkbox" id="filter-sale" />
            <label for="filter-sale">On Sale</label>
          </div>
        </div>
      </div>
    </aside>

    <!-- Products Area -->
    <main>
      <div class="shop-topbar">
        <div class="results-count" id="results-count">Loading products…</div>
        <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
          <button class="btn btn-ghost btn-sm filter-mobile-toggle" onclick="toggleFilterSidebar()">⚙️ Filters</button>
          <select class="sort-select" id="sort-select">
            <option value="">Sort: Default</option>
            <option value="price-asc">Price: Low to High</option>
            <option value="price-desc">Price: High to Low</option>
            <option value="rating">Top Rated</option>
            <option value="name-asc">Name: A–Z</option>
            <option value="newest">Newest First</option>
          </select>
        </div>
      </div>

      <div class="product-grid" id="products-grid"></div>

      <!-- Pagination -->
      <div class="pagination" id="pagination"></div>
    </main>
  </div>
</div>

<!-- Footer -->
<footer class="site-footer">
  <div class="container">
    <div class="footer-bottom">
      <span class="footer-copy">© 2024 GarageBasics. All rights reserved.</span>
      <span class="footer-copy">💳 Visa · Mastercard · PayPal · AmEx</span>
    </div>
  </div>
</footer>

<div id="toast-container"></div>
<script src="js/api.js"></script>
<script src="js/main.js"></script>
<script src="js/products.js"></script>
</body>
</html>
