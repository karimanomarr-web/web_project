<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Orders — GarageBasics</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body>
<div class="promo-bar">🚚 Free shipping on orders over $500 · <a href="products.html">Shop All →</a></div>
<header class="site-header">
  <div class="header-main"><div class="container"><div class="header-inner">
    <a href="index.html" class="site-logo"><div class="logo-icon">GB</div><div><div class="logo-text">Garage<span>Basics</span></div><div class="logo-tagline">Premium Garage Solutions</div></div></a>
    <div class="header-search"><form id="search-form"><span class="search-icon">🔍</span><input id="search-input" type="text" placeholder="Search products…" /><button type="submit" class="search-btn">Search</button></form></div>
    <div class="header-actions">
      <a href="login.html" class="header-btn" id="header-login-btn"><span class="icon">👤</span></a>
      <a href="#" class="header-btn hidden" id="header-user-btn"><span class="icon">👤</span><span id="header-user-name" class="user-name"></span></a>
      <a href="admin.html" class="header-btn hidden" id="header-admin-link"><span class="icon">⚙️</span></a>
      <a href="#" class="header-btn hidden" id="header-logout-btn"><span class="icon">🚪</span></a>
      <a href="cart.html" class="header-btn" style="position:relative;"><span class="icon">🛒</span><span class="cart-badge" style="display:none">0</span></a>
    </div>
  </div></div></div>
  <nav class="category-nav"><div class="container"><div class="cat-nav-inner" id="cat-nav"></div></div></nav>
</header>

<div style="background:var(--grey-100);padding:14px 0;border-bottom:1px solid var(--grey-200);">
  <div class="container"><div class="breadcrumb"><a href="index.html">Home</a><span class="breadcrumb-sep">›</span><span>My Orders</span></div></div>
</div>

<div class="container" style="padding: 40px 0 80px;">
  <h1 style="font-size:1.8rem; font-weight:900; margin-bottom:8px;">My Orders</h1>
  <p class="text-muted mb-6">Track and manage your order history.</p>

  <div id="orders-loading" style="text-align:center; padding:60px 0;"><div class="spinner"></div></div>
  <div id="orders-list" class="hidden"></div>
  <div id="orders-empty" class="hidden" style="text-align:center; padding:60px 20px;">
    <div style="font-size:4rem; margin-bottom:16px;">📋</div>
    <h3 style="margin-bottom:12px;">No orders yet</h3>
    <a href="products.html" class="btn btn-primary btn-lg">Start Shopping →</a>
  </div>
</div>

<footer class="site-footer"><div class="container"><div class="footer-bottom">
  <span class="footer-copy">© 2024 GarageBasics. All rights reserved.</span>
</div></div></footer>

<div id="toast-container"></div>
<script src="js/api.js"></script>
<script src="js/main.js"></script>
<script>
async function loadOrders() {
  if (!Auth.isLoggedIn()) {
    document.getElementById('orders-loading').innerHTML = `
      <div style="text-align:center; padding:60px 20px;">
        <div style="font-size:4rem; margin-bottom:16px;">🔒</div>
        <h3 style="margin-bottom:12px;">Sign in to view your orders</h3>
        <a href="login.html?redirect=orders.html" class="btn btn-primary btn-lg">Sign In →</a>
      </div>`;
    return;
  }
  try {
    const orders = await api.orders.getAll();
    document.getElementById('orders-loading').classList.add('hidden');
    if (!orders.length) { document.getElementById('orders-empty').classList.remove('hidden'); return; }
    const el = document.getElementById('orders-list');
    el.classList.remove('hidden');
    el.innerHTML = orders.map(o => `
      <div class="order-card mb-4">
        <div class="order-card-header">
          <div>
            <div class="order-id">${o.id}</div>
            <div style="font-size:0.75rem; color:var(--grey-500); margin-top:2px;">Placed ${new Date(o.createdAt).toLocaleDateString('en-US', {year:'numeric',month:'long',day:'numeric'})}</div>
          </div>
          <span class="order-status ${o.status}">${o.status.charAt(0).toUpperCase()+o.status.slice(1)}</span>
        </div>
        <div class="order-card-body">
          <div class="order-items-preview">
            ${o.items.slice(0,4).map(i => `<img class="order-item-thumb" src="${i.image}" alt="${i.name}" onerror="this.src='https://via.placeholder.com/56'">`).join('')}
            ${o.items.length > 4 ? `<div style="width:56px;height:56px;border-radius:var(--radius-sm);background:var(--grey-100);display:flex;align-items:center;justify-content:center;font-size:0.75rem;color:var(--grey-500);font-weight:700;">+${o.items.length-4}</div>` : ''}
          </div>
          <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px;">
            <div>
              <div style="font-size:0.85rem; color:var(--grey-600);">${o.items.length} item${o.items.length > 1 ? 's' : ''} · ${o.shipping.city}, ${o.shipping.state}</div>
            </div>
            <div style="text-align:right;">
              <div style="font-size:0.8rem; color:var(--grey-500);">Order Total</div>
              <div style="font-size:1.2rem; font-weight:900; color:var(--orange);">${formatPrice(o.total)}</div>
            </div>
          </div>
        </div>
      </div>`).join('');
  } catch (err) {
    document.getElementById('orders-loading').innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
  }
}
loadOrders();
</script>
</body>
</html>
